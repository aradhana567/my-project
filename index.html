<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aradhana's Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #000000, #0f0f0f, #1a1a1a);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 95%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(18px);
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      text-align: center;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #ff6a88, #ff99ac);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 15px;
      margin-bottom: 25px;
      opacity: 0.8;
    }

    /* PRODUCTS */
    .products {
      margin-bottom: 25px;
      text-align: left;
    }

    .products h2 {
      font-size: 18px;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .product-item {
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 14px;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .product-item:hover {
      background: rgba(255,255,255,0.15);
      transform: translateX(5px);
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      background: rgba(255,255,255,0.95);
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(45deg, #ff6a88, #ff99ac);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(255, 100, 140, 0.4);
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 30px rgba(255, 100, 140, 0.6);
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
      color: #fff;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Hi, I am Aradhana ✨</h1>
    <p>I love doing frontend and creating beautiful websites 💖</p>

    <!-- PRODUCTS SECTION -->
    <div class="products">
      <h2>✨ My Beauty Picks</h2>
      <div class="product-item">💄 Lipsticks Collection</div>
      <div class="product-item">🌸 Luxury Perfumes</div>
      <div class="product-item">💅 Makeup Essentials</div>
    </div>

    <form id="myForm">
      <input type="text" id="name" placeholder="Enter your name" required>
      <input type="text" id="roll" placeholder="Enter your roll number" required>
      <textarea id="thoughts" placeholder="Share your thoughts..." required></textarea>
      <button type="submit">Submit 🚀</button>
    </form>

    <div class="message" id="msg"></div>
  </div>

  <script>
    const form = document.getElementById("myForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        roll: document.getElementById("roll").value,
        thoughts: document.getElementById("thoughts").value
      };

      try {
        const res = await fetch("https://backend-c6ce.onrender.com/submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await res.text();

        msg.innerText = "Submitted successfully 💖";
        form.reset();

      } catch (error) {
        msg.innerText = "Error connecting to backend 😢";
      }
    });
  </script>

</body>
</html>
